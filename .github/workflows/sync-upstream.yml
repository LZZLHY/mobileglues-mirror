# Template: sync-upstream.yml for *-mirror repos
#
# 该文件不会被主仓 GitHub Actions 调起 —— 它是给 LZZLHY/<dep>-mirror 仓的
# .github/workflows/sync-upstream.yml 用的模板。详见 docs/guides/third-party-deps-restructure-plan.md §3.5.2
#
# 部署方式：见 scripts/deploy-mirror-repos.sh
#
# 强约束：永远 fast-forward，不用 --force / --force-with-lease（避免上游
# force-push 把 deps.lock 已 pin 的旧 commit 覆盖掉）。
#
# 使用：在 sync-upstream.yml 顶部用 https://github.com/MobileGL-Dev/MobileGlues.git placeholder，
# deploy-mirror-repos.sh 会按 mirror 名替换。

name: sync-upstream

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "amcl-mirror-bot"
          git config user.email "amcl-mirror@noreply.github.com"

      - name: Sync from upstream (preserve history on force-push)
        id: sync
        run: |
          git remote add upstream https://github.com/MobileGL-Dev/MobileGlues.git 2>/dev/null || git remote set-url upstream https://github.com/MobileGL-Dev/MobileGlues.git
          git fetch upstream --tags --prune

          # 关键：永远 fast-forward。上游 force-push 时本步会失败 → 报警 step。
          # deps.lock pin 的旧 commit 永远拉得到。
          if ! git push origin "refs/remotes/upstream/*:refs/heads/upstream-*"; then
            echo "::error::push refs failed (upstream may have force-pushed)"
            echo "force_push=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! git push origin --tags; then
            echo "::warning::push tags failed (upstream may have re-tagged)"
          fi

      - name: Open issue on force-push detection
        if: failure() && steps.sync.outputs.force_push == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[mirror] Upstream force-push detected on ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'Mirror sync failed because upstream force-pushed a branch.',
              '',
              `Upstream: \`https://github.com/MobileGL-Dev/MobileGlues.git\``,
              `Run:      ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Action items (manual):',
              '1. Inspect upstream ref logs / refs to identify what changed',
              '2. Archive the displaced refs to `archive/<date>/<branch>` if they should be preserved',
              '3. Re-run this workflow once safe',
              '',
              '_Auto-opened by sync-upstream.yml._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ['mirror', 'upstream-force-push'],
            });

